services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    expose:
      - "8000"
    env_file:
      - .env.local
    environment:
      - ASSETS_DIR=/app/local-assets
      - DEV_CACHE=false
    volumes:
      # Persist generated adventures across container restarts.
      - ./local-assets:/app/local-assets
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "5173:80"
    depends_on:
      - server
    restart: unless-stopped
