name: oinkoinklost-prod

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    expose:
      - "8000"
    env_file:
      - ${ENV_FILE:-.env.production}
    environment:
      ASSETS_DIR: /app/local-assets
      DEV_CACHE: "false"
    volumes:
      - game_assets:/app/local-assets
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/presets', timeout=5)"]
      interval: 15s
      timeout: 6s
      retries: 8
      start_period: 20s

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    expose:
      - "80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 15s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      client:
        condition: service_healthy
    restart: unless-stopped

volumes:
  game_assets:
  caddy_data:
  caddy_config:
